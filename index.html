<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/icons8-store-16.png">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>technology store</title>
  </head>
  <body>
    <div class="done">
      <button id="return"><i class="fa-solid fa-xmark"></i></button>
      <span><i class="fa-solid fa-check"></i></span>
      <h3>Successful operation</h3>
    </div>
    <header>
      <h3 class="logo">A</h3>
      <div>
        <button class="check"><i class="fa-solid fa-check"></i></button>
        <h3><i class="fa-solid fa-cart-shopping"></i><span id="count">0</span></h3>
      </div>
    </header>
    <main>
      <section class="products">
        <h2>the producs</h2>
        <div class="cards">
          <div class="card">
            <img src="images/head-phone.jpg" alt="product-image" />
            <h3>Head-phone</h3>
            <p>$ 200</p>
            <button>Add</button>
          </div>
          <div class="card">
            <img src="images/mobile.jpg" alt="product-image" />
            <h3>Mobile-phone</h3>
            <p>$ 500</p>
            <button>Add</button>
          </div>
          <div class="card">
            <img src="images/camera.jpg" alt="product-image" />
            <h3>Camera</h3>
            <p>$ 600</p>
            <button>Add</button>
          </div>
          <div class="card">
            <img src="images/earbuds.jpg" alt="product-image" />
            <h3>Earbuds</h3>
            <p>$ 150</p>
            <button>Add</button>
          </div>
          <div class="card">
            <img src="images/smart-watch.jpg" alt="product-image" />
            <h3>Smart-watch</h3>
            <p>$ 400</p>
            <button>Add</button>
          </div>
          <div class="card">
            <img src="images/labtop.jpg" alt="product-image" />
            <h3>Labtop</h3>
            <p>$ 1200</p>
            <button>Add</button>
          </div>
        </div>
      </section>
      <section class="price">
        <h2>your product</h2>
        <div id="cart">
          the cart empty!
        </div>
        <hr />
        <p>total: <span id="price">$ 0.00</span></p>
      </section>
    </main>
    <footer>
      <p>codding by <a href="https://github.com/baltmsah8-hash">abdo-hany</a></p>
    </footer>
    <script src="js/script.js"></script>
  </body>
</html>
